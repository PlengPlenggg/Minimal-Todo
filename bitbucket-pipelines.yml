image: ubuntu:latest

pipelines:
  default:
    - step:
        name: Run Android Tests
        script:
          # Update packages
          - apt-get update && apt-get install -y default-jdk nodejs npm python3 python3-pip
          
          # Install Python dependencies
          - pip install -r test-automation/requirements.txt
          
          # Install Appium
          - npm install -g appium
          - appium driver install uiautomator2
          
          # Download Android SDK
          - wget https://dl.google.com/android/repository/commandlinetools-linux-9477611_latest.zip
          - unzip commandlinetools-linux-9477611_latest.zip
          - mkdir -p /opt/android-sdk/cmdline-tools
          - mv cmdline-tools/* /opt/android-sdk/cmdline-tools/latest
          
          # Set environment variables
          - export ANDROID_HOME=/opt/android-sdk
          - export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools
          
          # Accept Android licenses
          - yes | sdkmanager --licenses
          
          # Install Android components
          - sdkmanager "platforms;android-31" "system-images;android-31;google_apis;x86_64" "build-tools;31.0.0"
          
          # Create and start emulator (for CI, might need to use cloud emulator)
          # For now, just run tests that don't require emulator
          - cd test-automation
          - robot -d results --dryrun tests/
        artifacts:
          - test-automation/results/**
          - test-automation/**

  pull-requests:
    '**':
      - step:
          name: Validate Tests
          script:
            - apt-get update && apt-get install -y python3 python3-pip
            - pip install -r test-automation/requirements.txt
            - cd test-automation
            - robot --dryrun tests/
            - robot -d results -v LOGLEVEL:DEBUG tests/ --dryrun
          artifacts:
            - test-automation/results/**

  branches:
    develop:
      - step:
          name: Run Test Suite
          script:
            - apt-get update && apt-get install -y default-jdk nodejs npm python3 python3-pip
            - pip install -r test-automation/requirements.txt
            - npm install -g appium
            - cd test-automation
            - robot -d results -i Positive tests/
          artifacts:
            - test-automation/results/**
