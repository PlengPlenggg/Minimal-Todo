name: Minimal-Todo Automated Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'test-automation/**'
      - '.github/workflows/android-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'test-automation/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        api-level: [30]
        target: [google_apis]
        arch: [x86_64]
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r test-automation/requirements.txt
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
    
    - name: Install Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2
    
    - name: AVD cache
      uses: actions/cache@v3
      id: avd-cache
      with:
        path: |
          ~/.android/avd/*
          ~/.android/adb*
        key: avd-${{ matrix.api-level }}
    
    - name: Create AVD and generate snapshot for caching
      if: steps.avd-cache.outputs.cache-hit != 'true'
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ matrix.api-level }}
        target: ${{ matrix.target }}
        arch: ${{ matrix.arch }}
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: echo "Generated AVD snapshot for caching."
    
    - name: Run automated tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ matrix.api-level }}
        target: ${{ matrix.target }}
        arch: ${{ matrix.arch }}
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshaker_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          # Start Appium in background
          appium --port 4723 > appium.log 2>&1 &
          APPIUM_PID=$!
          sleep 10
          
          # Verify Appium is running
          if ! kill -0 $APPIUM_PID; then
            echo "Failed to start Appium"
            cat appium.log
            exit 1
          fi
          
          # Run tests
          cd test-automation
          robot -d results -i Positive tests/
          
          # Kill Appium
          kill $APPIUM_PID || true
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.api-level }}
        path: test-automation/results/
        retention-days: 30
    
    - name: Publish test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Test Report (API ${{ matrix.api-level }})
        path: test-automation/results/output.xml
        reporter: java-junit
    
    - name: Comment PR with test results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const output = fs.readFileSync('test-automation/results/output.xml', 'utf8');
          
          // Parse and comment on PR
          const matches = output.match(/<statistics>[\s\S]*?<\/statistics>/);
          if (matches) {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Test Results\n\n\`\`\`\n${matches[0]}\n\`\`\``
            });
          }
